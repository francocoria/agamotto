version: "3.9"

# Local dev compose: API + Postgres (optional alternative to Supabase)
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: agamotto
      POSTGRES_PASSWORD: agamotto
      POSTGRES_DB: agamotto
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agamotto"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ../api
    environment:
      AGAMOTTO_DATABASE_URL: postgresql+psycopg://agamotto:agamotto@postgres:5432/agamotto
      AGAMOTTO_API_CORS_ORIGINS: '["http://localhost:3000"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
