<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="g1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d97e"/>
      <stop offset="60%" stop-color="#0a9956"/>
      <stop offset="100%" stop-color="#075a32"/>
    </radialGradient>
    <radialGradient id="g2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5ef0a8"/>
      <stop offset="100%" stop-color="#22d97e"/>
    </radialGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#075a32" stroke-width="2"/>
  <!-- Iris -->
  <circle cx="32" cy="32" r="22" fill="url(#g1)"/>
  <!-- Inner ring marks -->
  <g stroke="#0e1320" stroke-width="1" fill="none">
    <circle cx="32" cy="32" r="18" opacity="0.3"/>
    <circle cx="32" cy="32" r="14" opacity="0.5"/>
  </g>
  <!-- Pupil -->
  <ellipse cx="32" cy="32" rx="6" ry="10" fill="#06090d"/>
  <!-- Highlight -->
  <ellipse cx="30" cy="28" rx="2" ry="3" fill="#5ef0a8" opacity="0.85"/>
</svg>
